<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memristor Crossbar Design Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <button type="button" class="btn-new-chat" id="newChatBtn">
        <span class="btn-new-chat-icon">✎</span> New chat
      </button>
      <div class="sidebar-search">
        <span class="sidebar-search-icon" aria-hidden="true">⌕</span>
        <input type="text" id="searchChats" class="sidebar-search-input" placeholder="Search chats" autocomplete="off" />
      </div>
      <div class="sidebar-section">
        <h2 class="sidebar-heading">Your chats</h2>
        <div class="session-list" id="sessionList"></div>
      </div>
    </aside>
    <div class="content">
      <header class="header">
        <h1 class="title">Crossbar Assistant</h1>
        <select id="modelSelect" class="model-select" aria-label="Model">
          <option value="">Loading…</option>
        </select>
      </header>

      <main class="main">
        <div class="messages" id="messages">
          <div class="welcome" id="welcome">
            <p class="welcome-title">What's on your mind?</p>
            <p class="welcome-hint">Ask about memristor crossbars, signal processing, or search your local papers.</p>
          </div>
        </div>
        <form class="input-area" id="chatForm">
          <div class="input-wrap">
            <span class="input-add" aria-hidden="true">+</span>
            <textarea id="input" class="input" rows="1" placeholder="Ask anything" autocomplete="off"></textarea>
            <button type="submit" class="btn-send" id="sendBtn" aria-label="Send">
              <svg class="send-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
        </form>
      </main>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
